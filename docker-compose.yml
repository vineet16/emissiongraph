version: "3.9"

services:
  compute:
    build:
      context: ./compute
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./compute:/app
    command: uvicorn emissiongraph.api.routes:app --host 0.0.0.0 --port 8000 --reload
